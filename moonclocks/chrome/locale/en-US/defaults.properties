extensions.moonclocks@halvar666.description=MoonClocks shows times around the world - or just your local time - at the bottom of your browser. It deals with daylight saving time so you don't have to.

extensions.moonclocks.format.clock.standard=<l>: <d-s> <24h2>:<m>
extensions.moonclocks.format.clock.custom=<l>: <d-l>, <12h>:<m><am>
extensions.moonclocks.format.tooltip.standard=<12h>:<m> <am> <d-s>
extensions.moonclocks.format.tooltip.custom=<d-l>, <12h>:<m><am>
extensions.moonclocks.format.moonclocks.standard=<12h>:<m> <am> <d-s>
extensions.moonclocks.format.moonclocks.custom=<d-l>, <12h>:<m><am>
